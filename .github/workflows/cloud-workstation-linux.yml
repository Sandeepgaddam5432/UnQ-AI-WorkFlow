name: ☁️ Cloud Workstation - Linux (XFCE4) + OpenClaw

on:
  workflow_dispatch:
    inputs:
      vnc_resolution:
        description: 'VNC Resolution'
        required: false
        default: '1920x1080'
        type: choice
        options:
          - '1920x1080'
          - '1280x720'
          - '2560x1440'

env:
  VNC_DISPLAY: ':2'
  VNC_PORT: '5902'
  VNC_GEOMETRY: ${{ github.event.inputs.vnc_resolution || '1920x1080' }}
  VNC_DEPTH: '24'
  BACKUP_REPO: 'openclaw-backup'

jobs:
  linux-workstation:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ============================================================
      # PHASE 1: BACKUP RESTORE
      # ============================================================

      - name: 📥 Restore OpenClaw & Projects from Backup
        run: |
          echo "📥 Checking for backup repositories..."

          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global init.defaultBranch main

          TOKEN="${{ secrets.GH_TOKEN }}"
          [ -z "$TOKEN" ] && TOKEN="${{ secrets.GITHUB_TOKEN }}"
          BACKUP_URL="https://x-access-token:${TOKEN}@github.com/${GITHUB_ACTOR}/${{ env.BACKUP_REPO }}.git"

          OPENCLAW_DIR="$HOME/.openclaw"
          WORKSPACE_DIR="$HOME/Desktop/workspace"

          restore_openclaw() {
            mkdir -p "$OPENCLAW_DIR/memory" "$OPENCLAW_DIR/workspace"
            [ -d "/tmp/backup/openclaw/config" ] && cp -r /tmp/backup/openclaw/config/* "$OPENCLAW_DIR/" 2>/dev/null || true
            [ -d "/tmp/backup/openclaw/memory" ] && cp -r /tmp/backup/openclaw/memory/* "$OPENCLAW_DIR/memory/" 2>/dev/null || true
            for file in MEMORY.md USER.md SOUL.md AGENTS.md TOOLS.md IDENTITY.md HEARTBEAT.md BOOTSTRAP.md; do
              [ -f "/tmp/backup/openclaw/$file" ] && cp "/tmp/backup/openclaw/$file" "$OPENCLAW_DIR/workspace/" 2>/dev/null || true
            done
            [ -d "/tmp/backup/openclaw/skills" ] && cp -r /tmp/backup/openclaw/skills "$OPENCLAW_DIR/" 2>/dev/null || true
            echo "✅ OpenClaw restored"
          }

          if git ls-remote "$BACKUP_URL" &>/dev/null; then
            echo "✅ Backup found - restoring..."
            git clone --depth=1 "$BACKUP_URL" /tmp/backup

            [ -d "/tmp/backup/openclaw" ] && restore_openclaw || echo "ℹ️ No OpenClaw backup"

            if [ -f "/tmp/backup/projects/README.md" ]; then
              mkdir -p "$WORKSPACE_DIR"
              RESTORE_COUNT=0
              while IFS= read -r REPO_PATH; do
                [ -z "$REPO_PATH" ] && continue
                REPO_NAME=$(basename "$REPO_PATH")
                git clone --depth=1 "https://x-access-token:${TOKEN}@github.com/${REPO_PATH}.git" \
                  "$WORKSPACE_DIR/${REPO_NAME}" 2>/dev/null && \
                  RESTORE_COUNT=$((RESTORE_COUNT + 1)) && echo "  ✅ $REPO_NAME" || echo "  ⚠️ Failed: $REPO_NAME"
              done < <(grep -oP '^\s*-\s*\K\S+' /tmp/backup/projects/README.md)
              echo "✅ Restored $RESTORE_COUNT project(s)"
            fi
            rm -rf /tmp/backup

          else
            echo "📝 No backup - creating new..."
            mkdir -p /tmp/new-backup/{openclaw/config,openclaw/memory,projects}
            cat > /tmp/new-backup/README.md << 'EOFREADME'
# 📂 OpenClaw Cloud Workstation Backup
## Backed Up Projects
EOFREADME
            cd /tmp/new-backup
            git init && git add . && git commit -m "Initialize backup repository"
            git branch -M main

            HTTP_STATUS=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
              -X POST -H "Authorization: token ${TOKEN}" -H "Content-Type: application/json" \
              https://api.github.com/user/repos \
              -d "{\"name\":\"${{ env.BACKUP_REPO }}\",\"private\":true}")

            if [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 422 ]; then
              sleep 3
              git remote add origin "$BACKUP_URL"
              git push -u origin main 2>/dev/null || echo "⚠️ Push retry later"
            fi
            cd ~ && rm -rf /tmp/new-backup /tmp/api_response.json
          fi

      # ============================================================
      # PHASE 2: DESKTOP SETUP
      # ============================================================

      - name: 🖥️ Install XFCE4 Desktop & VNC Stack
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-terminal xfce4-goodies \
            tigervnc-standalone-server tigervnc-common \
            dbus-x11 xfonts-base xfonts-100dpi xfonts-75dpi \
            fonts-liberation inotify-tools git curl wget jq firefox
          echo "✅ XFCE4 installed"

      - name: 🔐 Configure VNC Server
        run: |
          VNC_PASS="${{ secrets.VNC_PASSWORD }}"
          [ -z "$VNC_PASS" ] && VNC_PASS="P@ssw0rd123!"

          mkdir -p ~/.vnc
          echo "$VNC_PASS" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          mkdir -p ~/.config/xfce4/{panel,xfconf,xfce4-session} ~/.local/share

          cat > ~/.vnc/xstartup << 'EOF'
#!/bin/bash
unset SESSION_MANAGER
unset DBUS_SESSION_BUS_ADDRESS
export XDG_CURRENT_DESKTOP="XFCE"
export XDG_SESSION_TYPE="x11"
export XDG_SESSION_DESKTOP="xfce"
export NO_AT_BRIDGE=1
[ -z "$DBUS_SESSION_BUS_ADDRESS" ] && eval $(dbus-launch --sh-syntax --exit-with-session)
[ -r $HOME/.Xresources ] && xrdb $HOME/.Xresources
xsetroot -solid "#2E3440"
vncconfig -iconic &
startxfce4
EOF
          chmod +x ~/.vnc/xstartup
          mkdir -p ~/Desktop/workspace
          echo "✅ VNC configured"

      - name: 🚀 Start VNC Server
        run: |
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          mkdir -p "$XDG_RUNTIME_DIR" && chmod 700 "$XDG_RUNTIME_DIR"

          vncserver ${{ env.VNC_DISPLAY }} \
            -geometry ${{ env.VNC_GEOMETRY }} \
            -depth ${{ env.VNC_DEPTH }} \
            -localhost no -alwaysshared

          sleep 8
          if pgrep -f "Xtigervnc.*${{ env.VNC_DISPLAY }}" > /dev/null; then
            echo "✅ VNC running on port ${{ env.VNC_PORT }}"
          else
            cat ~/.vnc/*.log 2>/dev/null; exit 1
          fi

      - name: ☁️ Setup Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb && rm cloudflared-linux-amd64.deb

          cloudflared tunnel --url tcp://localhost:${{ env.VNC_PORT }} > /tmp/cloudflare.log 2>&1 &
          sleep 10

          for i in $(seq 1 30); do
            HOSTNAME=$(grep -oP "https://\K[^[:space:]]+" /tmp/cloudflare.log 2>/dev/null | grep -m1 "trycloudflare.com")
            if [ -n "$HOSTNAME" ]; then
              echo "$HOSTNAME" > /tmp/cf_host.txt
              echo "✅ Tunnel: $HOSTNAME"; break
            fi
            sleep 2
          done
          [ -f /tmp/cf_host.txt ] || { echo "⚠️ Tunnel still initializing"; tail -15 /tmp/cloudflare.log; }

      # ============================================================
      # PHASE 3: OLLAMA SETUP
      # ============================================================

      - name: 🐙 Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &

          # FIX: Poll API readiness instead of blind sleep
          echo "⏳ Waiting for Ollama API..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && echo "✅ Ollama ready" && break
            sleep 2
          done
          ollama --version

      - name: 🤖 Pull AI Model
        run: |
          # FIX: glm-5:cloud cannot be pulled locally — it's a cloud-connect model
          # Pull a small local model as fallback
          echo "🤖 Pulling local fallback model..."
          if ollama pull qwen2.5:0.5b 2>/dev/null; then
            echo "qwen2.5:0.5b" > /tmp/active_model.txt
            echo "✅ Local model ready: qwen2.5:0.5b"
          elif ollama pull tinyllama 2>/dev/null; then
            echo "tinyllama" > /tmp/active_model.txt
            echo "✅ Local model ready: tinyllama"
          else
            echo "cloud-only" > /tmp/active_model.txt
            echo "⚠️ No local model — use Ollama cloud connect"
          fi

      - name: 🔗 Generate Ollama Cloud Connect Link
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "              🔗 OLLAMA CLOUD CONNECT"
          echo "════════════════════════════════════════════════════════"

          # FIX: 'ollama show --connect' doesn't exist — try correct commands
          CONNECT_OUTPUT=$(timeout 10 ollama cloud connect 2>/dev/null || \
                           timeout 10 ollama connect 2>/dev/null || echo "")

          if [ -n "$CONNECT_OUTPUT" ]; then
            CONNECT_URL=$(echo "$CONNECT_OUTPUT" | grep -oP 'https://[^\s]+' | head -1)
            [ -n "$CONNECT_URL" ] && echo "$CONNECT_URL" > /tmp/ollama_connect_url.txt && echo "🌐 $CONNECT_URL"
          else
            echo "ℹ️ Visit https://ollama.com → Dashboard → Connect"
            echo "" > /tmp/ollama_connect_url.txt
          fi
          echo "════════════════════════════════════════════════════════"

      - name: ⏳ Wait for Ollama Model
        run: |
          ACTIVE_MODEL=$(cat /tmp/active_model.txt 2>/dev/null || echo "")

          # FIX: Skip wait if local model already available
          if [ -n "$ACTIVE_MODEL" ] && [ "$ACTIVE_MODEL" != "cloud-only" ]; then
            echo "✅ Model '$ACTIVE_MODEL' ready — skipping cloud wait"
            exit 0
          fi

          CONNECT_URL=$(cat /tmp/ollama_connect_url.txt 2>/dev/null || echo "")
          echo "⏳ Waiting for cloud model (max 10 min)..."

          WAIT_COUNT=0
          while [ $WAIT_COUNT -lt 60 ]; do
            MODEL_LIST=$(ollama list 2>/dev/null | tail -n +2 | grep -v "^$" || echo "")
            [ -n "$MODEL_LIST" ] && echo "✅ Model available!" && echo "$MODEL_LIST" && break

            [ $((WAIT_COUNT % 12)) -eq 0 ] && {
              [ -n "$CONNECT_URL" ] && echo "🔗 $CONNECT_URL" || echo "🔗 https://ollama.com"
            }

            sleep 10
            WAIT_COUNT=$((WAIT_COUNT + 1))
          done

          [ $WAIT_COUNT -ge 60 ] && echo "⚠️ Timeout — continuing. Connect models later."

      # ============================================================
      # PHASE 4: OPENCLAW SETUP
      # ============================================================

      - name: 📦 Install Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version && npm --version && echo "✅ Node.js ready"

      - name: 🤖 Install OpenClaw
        run: |
          npm install -g openclaw
          openclaw --version 2>/dev/null || echo "OpenClaw installed"
          echo "✅ OpenClaw installed"

      - name: ⚙️ Configure OpenClaw
        run: |
          TOKEN="${{ secrets.GH_TOKEN }}"
          [ -z "$TOKEN" ] && TOKEN="${{ secrets.GITHUB_TOKEN }}"
          TELEGRAM_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"

          OPENCLAW_DIR="$HOME/.openclaw"
          ACTIVE_MODEL=$(cat /tmp/active_model.txt 2>/dev/null || echo "qwen2.5:0.5b")

          # FIX: Correct model string
          if [ "$ACTIVE_MODEL" = "cloud-only" ] || [ -z "$ACTIVE_MODEL" ]; then
            MODEL_STRING="ollama/glm4:latest"
          else
            MODEL_STRING="ollama/${ACTIVE_MODEL}"
          fi

          mkdir -p "$OPENCLAW_DIR/workspace" "$OPENCLAW_DIR/memory"

          if [ ! -f "$OPENCLAW_DIR/openclaw.json" ]; then
            GATEWAY_TOKEN=$(openssl rand -hex 24)
            cat > "$OPENCLAW_DIR/openclaw.json" << EOFCONFIG
{
  "auth": { "token": "${GATEWAY_TOKEN}" },
  "model": { "default": "${MODEL_STRING}" },
  "channels": {
    "telegram": { "enabled": true, "token": "${TELEGRAM_TOKEN}" }
  },
  "workspace": { "path": "${OPENCLAW_DIR}/workspace" }
}
EOFCONFIG
            echo "✅ Config created (model: ${MODEL_STRING})"
          else
            echo "✅ Using restored config"
          fi

          WORKSPACE="$OPENCLAW_DIR/workspace"
          CURRENT_DATE=$(date '+%Y-%m-%d')

          # FIX: Double-quoted heredoc so $CURRENT_DATE expands correctly
          [ ! -f "$WORKSPACE/MEMORY.md" ] && cat > "$WORKSPACE/MEMORY.md" << EOFMEM
# MEMORY.md - Long-Term Memory

## User Info
- Name: Sandeep Gaddam
- Language: Telugu-English mix

## Sessions
- Session started: ${CURRENT_DATE}
EOFMEM

          [ ! -f "$WORKSPACE/USER.md" ] && cat > "$WORKSPACE/USER.md" << 'EOFUSER'
# USER.md - About Your Human
- Name: Sandeep Gaddam
- Timezone: IST (UTC+5:30)
- Language: Telugu-English mix
EOFUSER

          [ ! -f "$WORKSPACE/SOUL.md" ] && cat > "$WORKSPACE/SOUL.md" << 'EOFSOUL'
# SOUL.md
- Be genuinely helpful
- Language: Telugu-English mix
- Vibe: Casual, friendly
EOFSOUL

          [ ! -f "$WORKSPACE/AGENTS.md" ] && cat > "$WORKSPACE/AGENTS.md" << 'EOFAGENTS'
# AGENTS.md
- MEMORY.md - Long-term memories
- memory/YYYY-MM-DD.md - Daily notes
- Don't run destructive commands without asking
EOFAGENTS

          [ ! -f "$WORKSPACE/IDENTITY.md" ] && cat > "$WORKSPACE/IDENTITY.md" << 'EOFID'
# IDENTITY.md
- Name: UnQBot
- Emoji: 🤖
- Vibe: Friendly, casual, helpful
EOFID

          cat > "$WORKSPACE/TOOLS.md" << EOFTOOLS
# TOOLS.md
- Model: ${MODEL_STRING}
- Telegram: @UnQChatai_Bot
EOFTOOLS

          echo "✅ OpenClaw workspace configured"

      - name: 🐍 Install Python
        run: |
          sudo apt-get install -y python3 python3-pip python3-venv python3-dev
          python3 --version && echo "✅ Python ready"

      - name: 💻 Install VS Code
        run: |
          wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /tmp/packages.microsoft.gpg
          sudo install -D -o root -g root -m 644 /tmp/packages.microsoft.gpg /etc/apt/keyrings/packages.microsoft.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" | \
            sudo tee /etc/apt/sources.list.d/vscode.list > /dev/null
          sudo apt-get update -qq && sudo apt-get install -y code
          rm /tmp/packages.microsoft.gpg
          code --version && echo "✅ VS Code installed"

      - name: ⚙️ Configure Git
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global init.defaultBranch main
          git config --global core.autocrlf input
          echo "✅ Git configured"

      # ============================================================
      # PHASE 5: START SERVICES
      # ============================================================

      - name: 🚀 Start OpenClaw Gateway
        run: |
          cd "$HOME/.openclaw"
          nohup openclaw gateway start > /tmp/openclaw.log 2>&1 &
          sleep 5
          pgrep -f "openclaw" > /dev/null && echo "✅ OpenClaw Gateway started" || \
            { echo "⚠️ OpenClaw start failed"; cat /tmp/openclaw.log; }

      - name: 🔄 Deploy Backup Watcher
        env:
          BACKUP_TOKEN: ${{ secrets.GH_TOKEN }}
          FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESOLVED_TOKEN="${BACKUP_TOKEN}"
          [ -z "$RESOLVED_TOKEN" ] && RESOLVED_TOKEN="${FALLBACK_TOKEN}"
          ACTOR="${GITHUB_ACTOR}"
          REPO_NAME="${{ env.BACKUP_REPO }}"

          # FIX: Token stored in file, not embedded in script (security + heredoc fix)
          echo "${RESOLVED_TOKEN}" > /tmp/.watcher_token
          chmod 600 /tmp/.watcher_token

          # FIX: Outer vars (ACTOR, REPO_NAME) expand at write time (no quotes on delimiter)
          # Inner runtime vars use \$ to defer to runtime
          cat > ~/backup-watcher.sh << EOFWATCHER
#!/bin/bash
GITHUB_USER="${ACTOR}"
BACKUP_REPO="${REPO_NAME}"
TOKEN="\$(cat /tmp/.watcher_token 2>/dev/null)"
PROJECTS_DIR="\$HOME/Desktop/workspace"
OPENCLAW_DIR="\$HOME/.openclaw"
LOG_FILE="\$HOME/backup-watcher.log"
TRACKED_FILE="\$HOME/.backed-up-items"
SCAN_INTERVAL=300

touch "\$TRACKED_FILE"
log() { echo "[\$(date '+%Y-%m-%d %H:%M:%S')] \$1" | tee -a "\$LOG_FILE"; }

backup_project() {
  local P="\$1" N="\$(basename "\$1")" K="project:\$(basename "\$1")"
  grep -qx "\$K" "\$TRACKED_FILE" 2>/dev/null && return
  [ -z "\$(ls -A "\$P" 2>/dev/null)" ] && return
  if [ -d "\$P/.git" ]; then
    cd "\$P" && git remote -v | grep -q "github.com" && { echo "\$K" >> "\$TRACKED_FILE"; return; }
  fi
  log "📤 Backing up: \$N"
  curl -s -X POST -H "Authorization: token \$TOKEN" -H "Content-Type: application/json" \
    https://api.github.com/user/repos -d "{\"name\":\"\$N\",\"private\":true}" >/dev/null 2>&1
  sleep 2
  cd "\$P"
  [ ! -d ".git" ] && git init
  git add -A && git commit -m "Auto-backup \$(date '+%Y-%m-%d %H:%M')" 2>/dev/null || true
  git branch -M main
  git remote remove origin 2>/dev/null || true
  git remote add origin "https://x-access-token:\${TOKEN}@github.com/\${GITHUB_USER}/\${N}.git"
  git push -u origin main --force 2>/dev/null && {
    log "✅ Pushed: \$N"
    echo "\$K" >> "\$TRACKED_FILE"
    update_index "project" "\$GITHUB_USER/\$N"
  } || log "⚠️ Push failed: \$N"
}

backup_openclaw() {
  log "📤 Backing up OpenClaw..."
  local TMP="/tmp/oc-\$\$"
  mkdir -p "\$TMP/openclaw/config" "\$TMP/openclaw/memory"
  cp "\$OPENCLAW_DIR/openclaw.json" "\$TMP/openclaw/config/" 2>/dev/null || true
  for f in MEMORY.md USER.md SOUL.md AGENTS.md TOOLS.md IDENTITY.md HEARTBEAT.md BOOTSTRAP.md; do
    cp "\$OPENCLAW_DIR/workspace/\$f" "\$TMP/openclaw/" 2>/dev/null || true
  done
  cp -r "\$OPENCLAW_DIR/memory/." "\$TMP/openclaw/memory/" 2>/dev/null || true
  [ -d "\$OPENCLAW_DIR/skills" ] && cp -r "\$OPENCLAW_DIR/skills" "\$TMP/openclaw/" 2>/dev/null || true

  local REMOTE="https://x-access-token:\${TOKEN}@github.com/\${GITHUB_USER}/\${BACKUP_REPO}.git"
  local EX="/tmp/ex-\$\$"
  if git clone --depth=1 "\$REMOTE" "\$EX" 2>/dev/null; then
    cp -r "\$TMP/openclaw" "\$EX/" 2>/dev/null || true
    cd "\$EX"
    git add -A
    git commit -m "OpenClaw backup \$(date '+%Y-%m-%d %H:%M')" 2>/dev/null || true
    git push --force 2>/dev/null || true
    cd ~ && rm -rf "\$EX"
  fi
  rm -rf "\$TMP"
  log "✅ OpenClaw backed up"
}

update_index() {
  local T="\$1" I="\$2"
  local R="https://x-access-token:\${TOKEN}@github.com/\${GITHUB_USER}/\${BACKUP_REPO}.git"
  local D="/tmp/idx-\$\$"
  git clone --depth=1 "\$R" "\$D" 2>/dev/null && cd "\$D" && \
    grep -q "\$I" README.md 2>/dev/null || { echo "- \$I" >> README.md; git add README.md; git commit -m "Add \$T" 2>/dev/null; git push 2>/dev/null || true; }
  cd ~ && rm -rf "\$D"
}

log "👁️ BACKUP WATCHER v3.1 STARTED"
for d in "\$PROJECTS_DIR"/*/; do [ -d "\$d" ] && backup_project "\$d"; done
backup_openclaw

while true; do
  sleep \$SCAN_INTERVAL
  log "🔍 Scanning..."
  for d in "\$PROJECTS_DIR"/*/; do [ -d "\$d" ] && backup_project "\$d"; done
  backup_openclaw
done
EOFWATCHER

          chmod +x ~/backup-watcher.sh
          nohup bash ~/backup-watcher.sh > /dev/null 2>&1 &
          sleep 3
          pgrep -f "backup-watcher.sh" > /dev/null && echo "✅ Backup watcher v3.1 deployed" || \
            { echo "❌ Watcher failed"; cat ~/backup-watcher.log; }

      # ============================================================
      # PHASE 6: FINAL INFO + KEEP ALIVE
      # ============================================================

      - name: 💡 Keep Alive & Connection Info
        run: |
          CF_HOST=$(cat /tmp/cf_host.txt 2>/dev/null || echo "")
          OLLAMA_URL=$(cat /tmp/ollama_connect_url.txt 2>/dev/null || echo "")
          MODEL=$(cat /tmp/active_model.txt 2>/dev/null || echo "unknown")

          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║   🚀 CLOUD WORKSTATION + OPENCLAW READY  🚀         ║"
          echo "╚══════════════════════════════════════════════════════╝"

          [ -n "$CF_HOST" ] && echo "
🖥️  VNC:
   1. cloudflared access tcp --hostname ${CF_HOST} --url 127.0.0.1:5902
   2. VNC Viewer → localhost:5902 | Password: P@ssw0rd123!"

          [ -n "$OLLAMA_URL" ] && echo "
🔗 OLLAMA: $OLLAMA_URL"

          echo "
🤖 TELEGRAM: @UnQChatai_Bot
📂 BACKUP:   ${GITHUB_ACTOR}/openclaw-backup (auto every 5 min)
🧠 MODEL:    ${MODEL}
⏱️  UPTIME:   6 hours max
"

          # FIX: POSIX-safe counter — (( )) can cause exit 1
          RESTART_COUNT=0
          MAX_RESTARTS=5

          while true; do
            sleep 1800
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] 💓 Heartbeat"

            # VNC restart
            if ! pgrep -f "Xtigervnc.*${{ env.VNC_DISPLAY }}" > /dev/null; then
              if [ "$RESTART_COUNT" -lt "$MAX_RESTARTS" ]; then
                echo "⚠️ VNC down — restarting..."
                export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
                vncserver ${{ env.VNC_DISPLAY }} \
                  -geometry ${{ env.VNC_GEOMETRY }} \
                  -depth ${{ env.VNC_DEPTH }} \
                  -localhost no -alwaysshared || true
                sleep 5
                RESTART_COUNT=$((RESTART_COUNT + 1))
              fi
            fi

            # OpenClaw restart
            pgrep -f "openclaw" > /dev/null || {
              echo "🔄 Restarting OpenClaw..."
              cd "$HOME/.openclaw" && nohup openclaw gateway start > /tmp/openclaw.log 2>&1 &
            }

            # Backup watcher restart
            pgrep -f "backup-watcher.sh" > /dev/null || {
              echo "🔄 Restarting backup watcher..."
              nohup bash ~/backup-watcher.sh > /dev/null 2>&1 &
            }
          done
